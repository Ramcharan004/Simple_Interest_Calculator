<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interest Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1 id="title">💰 Interest Calculator</h1>
                <p class="subtitle">📊 Calculate your interest amount</p>
            </div>
            <div class="controls">
                <select id="language" onchange="changeLanguage()" class="language-select">
                    <option value="en">ENGLISH</option>
                    <option value="te">TELUGU</option>
                </select>
            </div>
        </div>

        <!-- Form Section -->
        <form class="form-section" onsubmit="event.preventDefault(); calculateInterest();">
            <!-- Amount Input -->
            <div class="input-group">
                <label id="amtLabel" for="amount">Amount</label>
                <div class="input-wrapper">
                    <span class="currency">₹</span>
                    <input 
                        type="text" 
                        id="amount" 
                        placeholder="0"
                        oninput="formatAmount(this); updatePreview()"
                    >
                </div>
            </div>

            <!-- Interest Rate Input -->
            <div class="input-group">
                <label id="intLabel" for="interest">Interest per Month (%)</label>
                <div class="input-wrapper">
                    <input 
                        type="number" 
                        id="interest" 
                        placeholder="0.00"
                        step="0.01"
                        oninput="updatePreview()"
                    >
                    <span class="unit">%</span>
                </div>
                <div id="interestPreview" class="preview"></div>
            </div>

            <!-- Date Range -->
            <div class="date-group">
                <div class="input-group">
                    <label id="givenLabel" for="givenDate">Given Date</label>
                    <input 
                        type="text" 
                        id="givenDate" 
                        placeholder="Select date"
                        readonly
                    >
                </div>
                <div class="input-group">
                    <label id="returnLabel" for="returnDate">Return Date</label>
                    <input 
                        type="text" 
                        id="returnDate" 
                        placeholder="Select date"
                        readonly
                    >
                </div>
            </div>

            <!-- Duration Preview -->
            <div id="durationPreview" class="duration-info"></div>

            <!-- Buttons -->
            <div class="button-group">
                <button type="submit" id="calcBtn" class="btn-primary">Calculate</button>
                <button type="button" id="resetBtn" class="btn-secondary" onclick="resetForm()">Reset</button>
            </div>
        </form>

        <!-- Result Section (Hidden by default) -->
        <div id="resultBox" class="result-section">
            <div id="resultContent"></div>
            <button type="button" class="btn-download" onclick="downloadAsImage()">📸 Download as Image</button>
        </div>
    </div>
</body>
</html>
